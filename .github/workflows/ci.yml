name: CI — Incident Response System

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ── Job 1: Lint and validate config files ──────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 PyYAML
          pip install -r agent/requirements.txt

      - name: Lint Python files
        run: |
          flake8 agent/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --ignore=E501,W503

      - name: Validate YAML configs
        run: |
          python3 -c "
          import yaml, glob, sys
          files = glob.glob('monitoring/**/*.yml', recursive=True)
          errors = []
          for f in files:
              try:
                  yaml.safe_load(open(f))
                  print(f'  OK: {f}')
              except yaml.YAMLError as e:
                  errors.append(f'FAIL: {f} — {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'All {len(files)} YAML files valid.')
          "

      - name: Validate docker-compose syntax
        run: |
          pip install docker-compose
          docker-compose config --quiet
        continue-on-error: true   # docker socket not available in CI, just check syntax

  # ── Job 2: Run unit tests ──────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install -r agent/requirements.txt

      - name: Run tests
        run: |
          cd agent
          pytest tests/ -v --cov=. --cov-report=term-missing
        env:
          LOKI_URL: http://localhost:3100
          PROMETHEUS_URL: http://localhost:9090
          OLLAMA_URL: http://localhost:11434
          DB_PATH: /tmp/test_incidents.db

  # ── Job 3: Build Docker images ─────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent image
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          push: false
          tags: incident-response-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build api-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-service
          push: false
          tags: incident-response-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/worker-service
          push: false
          tags: incident-response-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max