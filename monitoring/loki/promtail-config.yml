# monitoring/loki/promtail-config.yml
# Promtail is the log shipping agent — it tails log files and
# pushes them to Loki. Think of it as the "Filebeat" equivalent in the ELK stack.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Tracks the last byte read in each log file so it doesn't re-send on restart
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs ────────────────────────────────
  # This is the critical config — it reads Docker's JSON log files
  # and attaches labels from Docker labels/metadata.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["logging=promtail"]   # Only collect from labelled containers

    relabel_configs:
      # Extract the container name and use it as the 'service' label in Loki
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: service

      # Extract the Docker label 'service' if set explicitly
      - source_labels: [__meta_docker_container_label_service]
        target_label: service

      # Keep the container ID for debugging
      - source_labels: [__meta_docker_container_id]
        target_label: container_id

    pipeline_stages:
      # Parse the JSON that Docker wraps around each log line
      - json:
          expressions:
            output: log         # The actual log message
            stream: stream      # stdout or stderr
            timestamp: time

      # Parse the inner log message if it's also JSON (structured logging)
      - json:
          expressions:
            level: level
            message: message
            error: error
          source: output

      # If the app doesn't output structured logs, try to detect the level
      - regex:
          expression: '(?i)(?P<detected_level>error|warn|warning|info|debug|critical|fatal)'
          source: output

      # Set the final log level label (structured wins over regex)
      - template:
          source: level
          template: '{{ if .Value }}{{ .Value }}{{ else }}{{ .detected_level }}{{ end }}'

      - labels:
          stream:
          level:

      # Use the timestamp from the log if available, otherwise use Promtail's time
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.000Z"

      - output:
          source: output

  # ── System logs (host machine) ───────────────────────────
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          service: system
          __path__: /var/log/*.log
