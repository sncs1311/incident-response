server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Docker wraps logs: {"log":"actual message\n","stream":"stdout","time":"..."}
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time

      # Try to parse structured JSON inside the log line
      - json:
          expressions:
            level: level
            service: service
          source: output

      # Fall back to regex level detection for plain text logs
      - regex:
          expression: '(?i)(?P<detected_level>error|warn|warning|info|debug|critical|fatal)'
          source: output

      - template:
          source: level
          template: '{{ if .Value }}{{ .Value }}{{ else }}{{ .detected_level }}{{ end }}'

      - labels:
          stream:
          level:
          service:

      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.000Z"

      - output:
          source: output